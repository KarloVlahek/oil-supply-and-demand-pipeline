<svg width="100%" viewBox="0 0 680 520" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>EPA CEMS data pipeline architecture diagram</title>
  <desc>End-to-end data pipeline from EPA CEMS API through GCS, BigQuery, dbt transformations, to Looker Studio dashboard, orchestrated by Prefect and provisioned by Terraform</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: sans-serif; fill: #1a1a1a; }
      .th { font-size: 14px; font-weight: 500; }
      .ts { font-size: 12px; fill: #555; }
      .arr { stroke: #888; stroke-width: 1.5; fill: none; }
      .leader { stroke: #aaa; stroke-width: 0.5; stroke-dasharray: 4 3; fill: none; }
      .teal rect   { fill: #E1F5EE; stroke: #0F6E56; }
      .purple rect { fill: #EEEDFE; stroke: #534AB7; }
      .amber rect  { fill: #FAEEDA; stroke: #854F0B; }
      .blue rect   { fill: #E6F1FB; stroke: #185FA5; }
      .coral rect  { fill: #FAECE7; stroke: #993C1D; }
      .green rect  { fill: #EAF3DE; stroke: #3B6D11; }
      .teal text.th   { fill: #085041; }
      .purple text.th { fill: #3C3489; }
      .amber text.th  { fill: #633806; }
      .blue text.th   { fill: #0C447C; }
      .coral text.th  { fill: #712B13; }
      .green text.th  { fill: #27500A; }
    </style>
  </defs>

  <!-- Terraform outer boundary -->
  <rect x="20" y="28" width="640" height="420" rx="16" fill="none" stroke="#bbb" stroke-width="0.5" stroke-dasharray="4 6"/>
  <text class="ts" x="340" y="470" text-anchor="middle">Terraform (GCP infrastructure)</text>

  <!-- EPA CEMS API -->
  <g class="teal">
    <rect x="40" y="40" width="140" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="110" y="63" text-anchor="middle" dominant-baseline="central">EPA CEMS API</text>
    <text class="ts" x="110" y="81" text-anchor="middle" dominant-baseline="central">hourly emissions data</text>
  </g>

  <!-- Arrow: API → client -->
  <line x1="110" y1="96" x2="110" y2="146" class="arr" marker-end="url(#arrow)"/>

  <!-- Prefect DAG boundary -->
  <rect x="20" y="128" width="180" height="204" rx="12" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="6 4"/>
  <text class="ts" x="110" y="450" text-anchor="middle">Prefect DAG</text>

  <!-- cems_client.py -->
  <g class="purple">
    <rect x="40" y="148" width="140" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="110" y="171" text-anchor="middle" dominant-baseline="central">cems_client.py</text>
    <text class="ts" x="110" y="189" text-anchor="middle" dominant-baseline="central">fetch + aggregate daily</text>
  </g>

  <!-- Arrow: client → GCS -->
  <line x1="110" y1="204" x2="110" y2="254" class="arr" marker-end="url(#arrow)"/>

  <!-- GCS -->
  <g class="amber">
    <rect x="40" y="256" width="140" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="110" y="279" text-anchor="middle" dominant-baseline="central">Google Cloud Storage</text>
    <text class="ts" x="110" y="297" text-anchor="middle" dominant-baseline="central">raw Parquet data lake</text>
  </g>

  <!-- Arrow: GCS → BQ -->
  <line x1="110" y1="312" x2="110" y2="362" class="arr" marker-end="url(#arrow)"/>

  <!-- bulk_load / load labels -->
  <line x1="180" y1="284" x2="198" y2="312" class="leader"/>
  <text class="ts" x="200" y="308" text-anchor="start">bulk_load.py (one-time)</text>
  <line x1="180" y1="392" x2="198" y2="380" class="leader"/>
  <text class="ts" x="200" y="376" text-anchor="start">load.py (daily)</text>

  <!-- BigQuery -->
  <g class="blue">
    <rect x="40" y="364" width="140" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="110" y="387" text-anchor="middle" dominant-baseline="central">BigQuery</text>
    <text class="ts" x="110" y="405" text-anchor="middle" dominant-baseline="central">raw_cems_daily table</text>
  </g>

  <!-- Arrow: BQ → dbt -->
  <line x1="180" y1="392" x2="268" y2="392" class="arr" marker-end="url(#arrow)"/>

  <!-- dbt -->
  <g class="coral">
    <rect x="270" y="364" width="140" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="387" text-anchor="middle" dominant-baseline="central">dbt Core</text>
    <text class="ts" x="340" y="405" text-anchor="middle" dominant-baseline="central">stg → int → marts</text>
  </g>

  <!-- Arrow: dbt → Looker -->
  <line x1="410" y1="392" x2="498" y2="392" class="arr" marker-end="url(#arrow)"/>

  <!-- Looker Studio -->
  <g class="green">
    <rect x="500" y="364" width="140" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="570" y="387" text-anchor="middle" dominant-baseline="central">Looker Studio</text>
    <text class="ts" x="570" y="405" text-anchor="middle" dominant-baseline="central">2-tile dashboard</text>
  </g>

</svg>
